databases:
  - name: whop-slack-task-bot-db
    databaseName: slack_task_bot
    user: slack_task_bot
    plan: starter

services:
  - type: worker
    name: whop-slack-task-bot
    runtime: node
    plan: starter
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: whop-slack-task-bot-db
          property: connectionString
      - key: SLACK_SOCKET_MODE
        value: "true"
      - key: REMINDER_INTERVAL_MINUTES
        value: "60"
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: ADMIN_SLACK_USER_IDS
        sync: false
